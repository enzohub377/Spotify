<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <script
      src="https://kit.fontawesome.com/a6a245a587.js"
      crossorigin="anonymous"
    ></script>
    <title>Spotify</title>
  </head>
  <body>
    <div class="container">
      <nav>
        <div class="Logo">
            <i class="fa-brands fa-spotify"></i>
        </div>
        <div class="Nav-Biblioteca">
            <i class="fa-solid fa-book"></i>
            <p>Sua Biblioteca +</p>
        </div>
        <div class="Nav-Playlist">
            <br>Crie sua Primeira Playlist</h5>
            <p>É facil vamos te ajudar</p>
            <button>Criar Playlist</button>
        </div>
        <div class="Nav-Podcast">
            <br>Que tal seguir um Podcast novo?</h5>
            <p>Avisaremos você sobre novos episódios</p>
            <button>Explorar Podcasts</button>
        </div>
      </nav>
      <main></main>
    </div>
  </body>
</html>
